<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap');
    @import url('https://cdn-uicons.flaticon.com/2.6.0/uicons-regular-rounded/css/uicons-regular-rounded.css');
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;  
      align-items: center;
      height: 100vh;
      width: 100%;
      box-sizing: border-box;

    }

    #container {
      background-color: #0065b3;
      width: 320px;
      height: auto;
      padding: 8px;
      border-radius: 10px;
      display: flex ;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: 'Roboto', sans-serif;
      box-sizing: border-box;

      .con-hd{
        width: 95%;
        height: 45px;
        background-color: #0065b3;
        border-radius: 10px;
        display: flex;
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
        /* padding: 0px 10px; */
     
        font-weight: 600;
        color: #ffffff;

        p{
          font-size: 18px;
        /* width: 100%; */
        text-align: center;
        font-weight: 600;
        color: #ffffff;
      }

      i{
        display: flex;
      }

      }


   

      .div-tabel{
        width: 100%;
        height: auto;
        background-color: #ffffff;
        border-radius: 10px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        /* margin-top: 10px; */
        position: relative;
        font-size: 13px;
        font-style: italic;
        overflow: hidden;
        transition: height 0.1s ease, padding .3s ease;
        height: 0 ;
        overflow: hidden;
        /* padding: 0 !important; */

        .div-hd{
          width: 90%;
          display: flex;
          flex-direction: row;
          justify-content: space-between;
          align-items: center;
          height: auto;
          border-radius: 10px;
          padding: 5px ;
          background-color: #0065b3;
          font-weight: 500;
          color: #ffffff;
          margin-top: 5px;
          

         
        }
          .div-dt1{
            width: 60%; 
            text-align: left;
            padding: 2px 0 2px 10px;
            word-wrap: break-word; /* ✅ allows wrapping of long words */
            overflow-wrap: break-word; /* ✅ modern, preferred */
          }
          .div-dt2{
            width: 10%;
            text-align: center;
            padding: 2px 0 2px 10px;
          }
          .div-dt3{
            width: 30%;
            text-align: center;
            padding: 2px 0 2px 10px;
          }

        .div-bdy{
          width: 95%;
          display: flex;
          flex-direction: column;
          justify-content: space-between;
          align-items: center;
          height: auto;
          border-radius: 10px;
          padding: 5px;
          background-color: #ffffff;
          font-weight: 500;
          color: #000000;
         

          .div-rw{
            width: 100%;
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            height: auto;
            border-radius: 10px;
            padding: 12px 0px;
            background-color: #ffffff;
            font-weight: 500;
            color: #000000;
            border-bottom: 1px solid #bebebe46;

          }

        }
      }

     
    }
    .collapsed {
      padding: 10px 0 !important;
  overflow: hidden;
  height: auto !important;
  transition: height 0.1s ease, padding .3s ease;
}

#toggleIcon {
  transition: transform 0.3s ease;
  cursor: pointer;
  font-size: 20px;
  transform: rotate(0deg);
}

#toggleIcon.rotated {
  transform: rotate(90deg);
}

  </style>
</head>
<body>
  <div id="container">
    <div class="con-hd">
    <p>Payment Status</p>
    <i id="toggleIcon" class="fi fi-rr-arrow-circle-right"></i>
  </div>

    <box class="div-tabel">
      <div class="div-hd">
        <div class="div-dt1">Status</div>
        <div class="div-dt2">Nop</div>
        <div class="div-dt3">Payment</div>
      </div>
      <div class="div-bdy">
        <div class="div-rw">
        <div class="div-dt1">Primary:DeclinedSecondary:AUTHORISED
          2
          </div>
        <div class="div-dt2">2</div>
        <div class="div-dt3">Rs 100.000</div>
        </div>
        <div class="div-rw">
          <div class="div-dt1">Success</div>
          <div class="div-dt2">2</div>
          <div class="div-dt3">Rs 100.000</div>
          </div>
          <div class="div-rw">
            <div class="div-dt1">Success</div>
            <div class="div-dt2">2</div>
            <div class="div-dt3">Rs 100.000</div>
            </div>
      </div>

      
    </box>
  </div>
  <script>
     const icon = document.getElementById("toggleIcon");
  const tableBox = document.querySelector(".div-tabel");
  
  icon.addEventListener("click", () => {
    tableBox.classList.toggle("collapsed");
    icon.classList.toggle("rotated");
    
  });
   </script>
</body>
</html>
